<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>モニターカンペ（カット別）｜現場モラル動画</title>
<style>
  :root { --accent: #e8a020; --bg: #ffffff; --text: #161616; --muted: #8a8a8a; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; flex-direction: column; height: 100vh; overflow: hidden;
    -webkit-user-select: none; user-select: none;
  }
  .topbar {
    display: flex; align-items: center; gap: 8px; padding: 10px 14px;
    background: #161616; color: #fff; font-size: 13px; flex-wrap: wrap;
  }
  .topbar .tag {
    background: rgba(232,160,32,.18); color: var(--accent); border: 1px solid rgba(232,160,32,.4);
    padding: 2px 9px; border-radius: 20px; font-size: 12px; white-space: nowrap;
  }
  .topbar .progress { color: #999; font-size: 11px; white-space: nowrap; margin-left: auto; }
  .topbar select {
    background: #2a2a2a; color: #fff; border: 1px solid #444; border-radius: 6px;
    padding: 4px 8px; font-size: 12px; max-width: 40vw;
  }
  .topbar .fs { background: #2a2a2a; color: #fff; border: 1px solid #444; border-radius: 6px; padding: 4px 9px; font-size: 12px; cursor: pointer; }
  .stage {
    --fit: 1;
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 28px; text-align: center; gap: 14px; overflow-y: auto; cursor: pointer;
    background: #fff;
  }
  .stage.scene-slide { background: linear-gradient(135deg, #1a1a1a, #2a2000); color: #fff; }
  .stage.cat-cast { background: #eaf3ff; }
  .stage.cat-ai { background: #f5ecff; }
  .stage.cat-insert { background: #f0f0f0; }
  .scene-slide .scene-num { font-size: 12px; letter-spacing: 4px; color: var(--accent); text-transform: uppercase; }
  .scene-slide h1 { font-size: calc(var(--fit) * clamp(1.6em, 6vw, 2.6em)); margin-top: 10px; line-height: 1.4; }
  .scene-slide .time { color: var(--accent); font-size: 0.95em; margin-top: 12px; }
  .scene-slide .purpose { max-width: 560px; color: #bbb; font-size: calc(var(--fit) * 0.95em); margin-top: 20px; line-height: 1.75; }
  .cat-badge {
    display: inline-block; font-size: 12px; font-weight: 700; letter-spacing: .3px;
    padding: 4px 12px; border-radius: 20px; margin-bottom: 6px;
  }
  .cat-cast .cat-badge { background: #cfe3ff; color: #1657a8; }
  .cat-ai .cat-badge { background: #e6d3ff; color: #6b21a8; }
  .cat-insert .cat-badge { background: #dcdcdc; color: #4a4a4a; }
  .cut-item { max-width: 700px; width: 100%; }
  .cut-item .action { color: var(--muted); font-size: calc(var(--fit) * clamp(1em, 3vw, 1.3em)); margin: 10px 0; }
  .cut-item .action::before { content: "▷ "; }
  .cut-item .speaker { color: var(--accent); font-weight: 700; font-size: calc(var(--fit) * clamp(1em, 3vw, 1.3em)); margin-top: 20px; }
  .cut-item .speech { font-weight: 800; font-size: calc(var(--fit) * clamp(1.5em, 5.5vw, 3em)); line-height: 1.45; margin-top: 6px; }
  .notes { max-width: 620px; color: var(--muted); font-style: italic; font-size: calc(var(--fit) * clamp(0.85em, 2.5vw, 1.05em)); margin-top: 26px; border-top: 1px solid #eee; padding-top: 14px; }
  .navbar { display: flex; border-top: 1px solid #eee; flex-shrink: 0; }
  .navbar button { flex: 1; padding: 18px; border: none; background: #fafafa; font-size: 15px; font-weight: 700; color: #333; cursor: pointer; }
  .navbar button:active { background: #eee; }
  .navbar button:disabled { opacity: .3; }
  .navbar .next { background: #161616; color: #fff; }
</style>
</head>
<body>
<div class="topbar">
  <span class="tag" id="tagScene">シーン -</span>
  <span class="tag" id="tagCut">カット -</span>
  <button class="fs" id="fsBtn" title="全画面表示">⛶</button>
  <span class="progress" id="progress">- / -</span>
  <select id="jump"></select>
</div>
<div class="stage" id="stage"></div>
<div class="navbar">
  <button id="prevBtn">← 前のカット</button>
  <button id="nextBtn" class="next">次のカット →</button>
</div>
<script>
const SCENES = [{"num": 1, "title": "オープニング", "time": "0:00〜1:20", "purpose": "住宅地の「静かな朝の日常」を見せ、そこに工事現場が存在することの違和感を自然に示す。", "cuts": [{"letter": "A", "camera": "固定・引き", "items": [{"type": "action", "text": "朝の静かな道路の空カット（人物なし）。木漏れ日や光が差す感じ"}], "notes": [], "category": "insert", "category_label": "🎞 インサート・環境カット"}, {"letter": "B", "camera": "AI生成（遠景）", "items": [{"type": "action", "text": "遠くから登校する子ども（後ろ姿・遠景。現場が背景に入る構図）"}], "notes": [], "category": "ai", "category_label": "🤖 AI生成"}, {"letter": "C", "camera": "固定", "items": [{"type": "action", "text": "住民が洗濯物を干す（2階ベランダ目線／地上目線の2パターン）"}], "notes": [], "category": "insert", "category_label": "🎞 インサート・環境カット"}, {"letter": "D", "camera": "固定・望遠", "items": [{"type": "action", "text": "犬の散歩をする人。のどかな日常感"}], "notes": [], "category": "insert", "category_label": "🎞 インサート・環境カット"}, {"letter": "E", "camera": "固定・引き", "items": [{"type": "action", "text": "そのすぐ隣に工事現場がある全景カット。現場の存在感を出す"}], "notes": [], "category": "insert", "category_label": "🎞 インサート・環境カット"}, {"letter": "F", "camera": "固定", "items": [{"type": "action", "text": "協力業者の車両が現場に入ってくる。静かな朝に車が入る対比"}], "notes": ["実キャストのセリフなし（ナレーションのみ）。映像で日常感を作る"], "category": "insert", "category_label": "🎞 インサート・環境カット"}]}, {"num": 2, "title": "朝の現場到着", "time": "1:20〜2:40", "purpose": "作業前の「何気ない行動」が近隣にどう見えているかを対比で見せる。", "cuts": [{"letter": "A", "camera": "固定", "items": [{"type": "action", "text": "車のドアを強く閉める瞬間"}], "notes": [], "category": "insert", "category_label": "🎞 インサート・環境カット"}, {"letter": "B", "camera": "手持ち・近接", "items": [{"type": "action", "text": "高木・村田が大声で会話しながら歩く。手持ちで距離感を出す"}, {"type": "line", "speaker": "高木", "text": "昨日遅かったんで、眠いっすね。"}, {"type": "line", "speaker": "村田", "text": "朝礼までまだあるし、少し休んでおけばいいだろ。"}], "notes": ["高木＝悪気ゼロで自然に眠そうに。村田＝それが普通だと思っている自然体"], "category": "cast", "category_label": "🎬 キャスト出演"}, {"letter": "C", "camera": "固定・低アングル", "items": [{"type": "action", "text": "村田が資材置き場付近で横になる。地面から見上げる感じで"}], "notes": [], "category": "cast", "category_label": "🎬 キャスト出演"}, {"letter": "D", "camera": "AI生成（住民視点）", "items": [{"type": "action", "text": "近隣住民がカーテン越しに現場を見る。少し開けて覗く"}], "notes": [], "category": "ai", "category_label": "🤖 AI生成"}, {"letter": "E", "camera": "固定・引き", "items": [{"type": "action", "text": "坂口が声をかけるシーン全体"}], "notes": [], "category": "cast", "category_label": "🎬 キャスト出演"}, {"letter": "F", "camera": "切り返し（坂口→高木）", "items": [{"type": "line", "speaker": "坂口", "text": "おはよう。ここは住宅地の現場だから、朝の行動には特に気をつけよう。大きな声で話さない。車のドアも静かに閉める。現場内でも寝転がらない。作業前でも、近隣の方から見れば、俺たちは現場の人間だからな。"}, {"type": "line", "speaker": "高木", "text": "すみません。まだ作業前だから、そこまで気にしていませんでした。"}, {"type": "line", "speaker": "坂口", "text": "そう思いがちだけど、現場の印象は朝の到着時から始まっている。良い仕事をするためにも、まず現場に入る姿勢から整えよう。"}], "notes": ["坂口＝責めず「みんなで気をつけよう」。軽く肩に手を置く親近感"], "category": "cast", "category_label": "🎬 キャスト出演"}]}, {"num": 3, "title": "朝礼前・7時30分の準備音", "time": "2:40〜4:00", "purpose": "音の問題を視覚的にも表現する。", "cuts": [{"letter": "A", "camera": "クローズアップ", "items": [{"type": "action", "text": "時計が7:30を指している（できれば実際の時計をCUで）"}], "notes": [], "category": "insert", "category_label": "🎞 インサート・環境カット"}, {"letter": "B", "camera": "固定", "items": [{"type": "action", "text": "工具箱が「ガン」と置かれる瞬間"}], "notes": [], "category": "insert", "category_label": "🎞 インサート・環境カット"}, {"letter": "C", "camera": "手持ち・追い", "items": [{"type": "action", "text": "資材を引きずる職人の手元から足元へパン"}], "notes": [], "category": "insert", "category_label": "🎞 インサート・環境カット"}, {"letter": "D", "camera": "AI生成", "items": [{"type": "action", "text": "住民が室内で時計を見ながら現場の音に気づく"}, {"type": "line", "speaker": "近隣住民", "text": "まだ7時半なのに、もう音がしている……。"}], "notes": ["怒りでなく困り。眉をひそめる程度"], "category": "ai", "category_label": "🤖 AI生成"}, {"letter": "E", "camera": "固定・引き", "items": [{"type": "action", "text": "坂口が気づいて止める"}, {"type": "line", "speaker": "高木", "text": "先に準備しておいた方が、作業開始してすぐ動けますよね。"}, {"type": "line", "speaker": "村田", "text": "準備だけだから、作業じゃないしな。"}, {"type": "line", "speaker": "坂口", "text": "ちょっと待とう。まだ音を出す時間じゃない。"}, {"type": "line", "speaker": "高木", "text": "作業じゃなくて、準備だけでもですか？"}, {"type": "line", "speaker": "坂口", "text": "準備でも、音が出れば近隣の方には作業音と同じに聞こえる。特に朝の住宅地では、金属音や資材を動かす音は思っている以上に響くんだ。"}], "notes": ["高木＝純粋な疑問（生意気でなく）。村田＝正論だと思っている。坂口＝冷静に止める"], "category": "cast", "category_label": "🎬 キャスト出演"}, {"letter": "F", "camera": "切り返し（山口が加わる3者）", "items": [{"type": "action", "text": "元請け現場監督の山口が近づく"}, {"type": "line", "speaker": "山口", "text": "おはようございます。皆さん、朝早くからありがとうございます。ただ、この現場は住宅地の中にあります。作業開始時間前の音は、近隣クレームにつながりやすい部分です。朝礼前にできるのは、音の出ない確認や打ち合わせまでにしましょう。工具や資材を動かす作業は、決められた時間からお願いします。"}, {"type": "line", "speaker": "村田", "text": "準備くらいならいいと思っていました。"}, {"type": "line", "speaker": "山口", "text": "その気持ちは分かります。ただ、近隣の方には「もう工事が始まっている」と受け取られてしまいます。時間を守ることは、現場の信用を守ることでもあります。"}], "notes": ["山口＝怒らない。「ご理解いただいて助かります」という姿勢"], "category": "cast", "category_label": "🎬 キャスト出演"}]}, {"num": 4, "title": "朝礼・協力業者として現場に入る意識", "time": "4:00〜5:00", "purpose": "チームとして現場に入る意識の高揚感を出す。教訓的にならないよう、現場の雰囲気を大切に。", "cuts": [{"letter": "A", "camera": "固定・引き", "items": [{"type": "action", "text": "全員が集まった朝礼の全体カット"}], "notes": [], "category": "insert", "category_label": "🎞 インサート・環境カット"}, {"letter": "B", "camera": "固定・正面やや下から", "items": [{"type": "action", "text": "山口がスピーチ。リーダーとしての貫禄を出す"}, {"type": "line", "speaker": "山口", "text": "本日もよろしくお願いします。この現場は住宅地の中にあります。近隣住宅、通学路、歩行者の通行があります。作業内容だけでなく、音、粉じん、臭い、言葉遣い、服装、道路清掃にも注意してください。近隣の方から見ると、元請けも協力業者も区別はありません。ここで作業する全員が、この現場の顔です。"}], "notes": ["大きすぎず小さすぎない声。全員の顔を見渡しながら。「一緒にやっていこう」の雰囲気"], "category": "cast", "category_label": "🎬 キャスト出演"}, {"letter": "C", "camera": "固定", "items": [{"type": "action", "text": "聞いている職人たちの表情（高木・村田それぞれ）"}, {"type": "line", "speaker": "坂口", "text": "うちの職人も、今日はその意識でお願いします。良い仕事をするのは当然。でも、それだけじゃなく、周りに迷惑をかけないこともプロの仕事です。作業中だけじゃなく、休憩中、移動中、片付け中も見られている。そこまで含めて、職人としての信用だからな。"}], "notes": ["坂口＝「指導」でなく「共有」の温度感で"], "category": "cast", "category_label": "🎬 キャスト出演"}, {"letter": "D", "camera": "切り返し（坂口→高木）", "items": [{"type": "line", "speaker": "高木", "text": "現場の外からどう見えるかも考える、ということですね。"}, {"type": "line", "speaker": "坂口", "text": "そういうこと。自分たちの会社 ype": "line", "speaker": "坂口", "text": "そうだ。現場での仕事は、作業そのものだけじゃない。来た時。作業している時。休憩している時。帰る時。全部が、自分たちの仕事の評価につながる。"}], "notes": [], "category": "cast", "category_label": "🎬 キャスト出演"}, {"letter": "F", "camera": "固定・引き", "items": [{"type": "action", "text": "全員でホウキを持って清掃する（達成感のある画）"}], "notes": [], "category": "insert", "category_label": "🎞 インサート・環境カット"}, {"letter": "G", "camera": "クローズアップ", "items": [{"type": "action", "text": "高木が自ら気づいて「こっちも」と声をかける表情（**山場**）"}, {"type": "line", "speaker": "高木", "text": "こっちも少し汚れています。ここも掃いてから帰ります。"}, {"type": "line", "speaker": "村田", "text": "いいね。そこに気づけるようになったら、一人前だな。"}, {"type": "line", "speaker": "坂口", "text": "そういう気づきが、信頼される職人につながる。"}], "notes": ["高木＝後半は自ら気づく＝山場。少し照れながらも自信がにじむ。村田＝温かい笑顔"], "category": "cast", "category_label": "🎬 キャスト出演"}, {"letter": "H", "camera": "固定", "items": [{"type": "action", "text": "清掃後のきれいな道路カット。Before/Afterの対比に使える"}], "notes": [], "category": "insert", "category_label": "🎞 インサート・環境カット"}]}, {"num": 12, "title": "エンディング", "time": "14:35〜15:00", "purpose": "1日を通じた学びの集大成。希望感・温かさで締める。", "cuts": [{"letter": "A", "camera": "固定・引き", "items": [{"type": "action", "text": "清掃され整った現場の全景。夕方の光（ゴールデンアワー推奨）"}], "notes": [], "category": "insert", "category_label": "🎞 インサート・環境カット"}, {"letter": "B", "camera": "固定", "items": [{"type": "action", "text": "職人たちが服装を整えて現場を後にする後ろ姿"}], "notes": [], "category": "insert", "category_label": "🎞 インサート・環境カット"}, {"letter": "C", "camera": "固定", "items": [{"type": "action", "text": "高木が通行人に会釈する。通行人が微笑む"}], "notes": ["高木＝自然な温かさが出るまで繰り返す。通行人＝微笑んで会釈を返す"], "category": "cast", "category_label": "🎬 キャスト出演"}, {"letter": "D", "camera": "AI生成", "items": [{"type": "action", "text": "近隣住民が安心した表情で通り過ぎる（後ろ姿）"}], "notes": ["柔らかい笑顔・ホッとした雰囲気"], "category": "ai", "category_label": "🤖 AI生成"}, {"letter": "E", "camera": "固定・引き", "items": [{"type": "action", "text": "誰もいなくなった現場の佇まい。タイトルテロップ用"}], "notes": ["実キャストのセリフなし（ナレーションのみ）。表情と所作で温かさを出す"], "category": "insert", "category_label": "🎞 インサート・環境カット"}]}];

const slides = [];
const sceneStartIndex = {};
SCENES.forEach(sc => {
  sceneStartIndex[sc.num] = slides.length;
  slides.push({ type: "scene", scene: sc });
  sc.cuts.forEach(cut => slides.push({ type: "cut", scene: sc, cut }));
});

let idx = 0;
const stage = document.getElementById("stage");
const tagScene = document.getElementById("tagScene");
const tagCut = document.getElementById("tagCut");
const progress = document.getElementById("progress");
const jump = document.getElementById("jump");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");
const fsBtn = document.getElementById("fsBtn");

SCENES.forEach(sc => {
  const opt = document.createElement("option");
  opt.value = sceneStartIndex[sc.num];
  opt.textContent = `シーン${sc.num} ${sc.title}`;
  jump.appendChild(opt);
});

function esc(str) {
  const d = document.createElement("div");
  d.textContent = str == null ? "" : str;
  return d.innerHTML;
}

// 台本の **強調** をそのまま踏襲して<strong>にする（安全上の注意など）。escでエスケープ後に変換するのでHTML注入の心配はない。
function fmt(str) {
  return esc(str).replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
}

function render() {
  const s = slides[idx];
  tagScene.textContent = `シーン${s.scene.num}`;
  progress.textContent = `${idx + 1} / ${slides.length}`;
  jump.value = sceneStartIndex[s.scene.num];

  if (s.type === "scene") {
    tagCut.textContent = "導入";
    stage.className = "stage scene-slide";
    stage.innerHTML = `
      <div class="scene-num">SCENE ${s.scene.num}</div>
      <h1>${esc(s.scene.title)}</h1>
      <div class="time">${esc(s.scene.time)}</div>
      <div class="purpose">${esc(s.scene.purpose)}</div>
    `;
  } else {
    const cut = s.cut;
    tagCut.textContent = `カット${cut.letter}（${cut.camera}）`;
    stage.className = "stage cat-" + cut.category;
    let html = `<div class="cat-badge">${esc(cut.category_label)}</div>`;
    cut.items.forEach(it => {
      if (it.type === "action") {
        html += `<div class="cut-item"><div class="action">${fmt(it.text)}</div></div>`;
      } else {
        html += `<div class="cut-item"><div class="speaker">${esc(it.speaker)}</div><div class="speech">${fmt(it.text)}</div></div>`;
      }
    });
    if (cut.notes.length) {
      html += `<div class="notes">${cut.notes.map(fmt).join("<br>")}</div>`;
    }
    stage.innerHTML = html;
  }
  prevBtn.disabled = idx === 0;
  nextBtn.disabled = idx === slides.length - 1;
  requestAnimationFrame(fitStage);
}

// 文字数が多いカットでも画面からはみ出さないよう、収まるまでフォントサイズを段階的に縮小する
function fitStage() {
  let fit = 1;
  stage.style.setProperty("--fit", fit);
  let guard = 0;
  while (stage.scrollHeight > stage.clientHeight + 1 && fit > 0.5 && guard < 40) {
    fit = Math.round((fit - 0.03) * 100) / 100;
    stage.style.setProperty("--fit", fit);
    guard++;
  }
}

function go(delta) {
  idx = Math.max(0, Math.min(slides.length - 1, idx + delta));
  render();
}

prevBtn.addEventListener("click", (e) => { e.stopPropagation(); go(-1); });
nextBtn.addEventListener("click", (e) => { e.stopPropagation(); go(1); });
jump.addEventListener("click", (e) => e.stopPropagation());
jump.addEventListener("change", () => { idx = parseInt(jump.value, 10); render(); });
fsBtn.addEventListener("click", (e) => {
  e.stopPropagation();
  if (document.fullscreenElement) document.exitFullscreen();
  else document.documentElement.requestFullscreen();
});
stage.addEventListener("click", (e) => {
  if (e.clientX < window.innerWidth / 2) go(-1); else go(1);
});
document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowRight" || e.key === " ") { e.preventDefault(); go(1); }
  if (e.key === "ArrowLeft") { e.preventDefault(); go(-1); }
});

render();
</script>
